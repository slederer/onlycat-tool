services:
  onlycat:
    build: .
    restart: unless-stopped
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/data/onlycat_events.db
      - SYNC_INTERVAL_HOURS=24
      - LATITUDE=48.8631
      - LONGITUDE=2.3839
      - TIMEZONE=Europe/Paris
    volumes:
      - onlycat_data:/data

volumes:
  onlycat_data:
